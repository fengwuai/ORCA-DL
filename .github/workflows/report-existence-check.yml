name: Monthly Report Existence Check

on:
  schedule:
    # Asia/Shanghai 每月 21 日 10:00，对应 UTC 每月 21 日 02:00
    - cron: "0 2 21 * *"
  workflow_dispatch:
    inputs:
      target_month:
        description: "报告月份（YYYY-MM），留空则自动检查上个月"
        required: false
        type: string

permissions:
  contents: read

jobs:
  check-report:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target month
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          input_month='${{ github.event.inputs.target_month }}'
          if [[ -n "${input_month}" ]]; then
            if [[ ! "${input_month}" =~ ^[0-9]{4}-[0-9]{2}$ ]]; then
              echo "target_month 格式错误：${input_month}（应为 YYYY-MM）" >&2
              exit 1
            fi
            target_month="${input_month}"
          else
            target_month="$(TZ=Asia/Shanghai date -d 'last month' +%Y-%m)"
          fi

          report_url="https://qx.app.xmschain.com/public/ocean_report/${target_month}.pdf"

          echo "target_month=${target_month}" >> "$GITHUB_OUTPUT"
          echo "report_url=${report_url}" >> "$GITHUB_OUTPUT"

      - name: Check report url
        id: check
        shell: bash
        run: |
          set -euo pipefail

          report_url='${{ steps.resolve.outputs.report_url }}'
          http_code="$(curl -sS -L -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 30 "${report_url}")"

          echo "http_code=${http_code}" >> "$GITHUB_OUTPUT"

          if [[ "${http_code}" != "200" ]]; then
            echo "报告不存在或不可访问：${report_url} (HTTP ${http_code})" >&2
            exit 1
          fi

          echo "报告存在：${report_url}"

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## 月度报告巡检结果"
            echo ""
            echo "- 目标月份：\`${{ steps.resolve.outputs.target_month }}\`"
            echo "- 报告地址：${{ steps.resolve.outputs.report_url }}"
            echo "- HTTP 状态码：\`${{ steps.check.outputs.http_code || 'N/A' }}\`"
            echo "- 结论：${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
