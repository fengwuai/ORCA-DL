name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to UHub
        run: docker login uhub.usuanova.com -u ${{ secrets.UHUB_USERNAME }} -p ${{ secrets.UHUB_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            uhub.usuanova.com/xiangfeng/orca-dl-pipeline:${{ github.sha }}
            uhub.usuanova.com/xiangfeng/orca-dl-pipeline:latest
          cache-from: type=gha,scope=orca-pipeline
          cache-to: type=gha,mode=max,scope=orca-pipeline

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Upload docker-compose file
        run: |
          ssh -i ~/.ssh/deploy_key ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} "mkdir -p ${{ vars.DEPLOY_PATH }}"
          scp -i ~/.ssh/deploy_key \
            deploy/docker-compose.prod.yml \
            ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:${{ vars.DEPLOY_PATH }}/docker-compose.yml

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} << 'ENDSSH'
            cd ${{ vars.DEPLOY_PATH }}

            cat > .env << EOF
          REGISTRY=uhub.usuanova.com
          IMAGE_NAME=xiangfeng/orca-dl-pipeline

          PREFECT_API_URL=${{ vars.PREFECT_API_URL }}
          PREFECT_API_AUTH_STRING=${{ secrets.PREFECT_API_AUTH_STRING }}

          ARK_API_KEY=${{ secrets.ARK_API_KEY }}

          US3_PUBLIC_KEY=${{ secrets.US3_PUBLIC_KEY }}
          US3_PRIVATE_KEY=${{ secrets.US3_PRIVATE_KEY }}
          US3_END_POINT=${{ vars.US3_END_POINT }}
          EOF

            docker login uhub.usuanova.com -u ${{ secrets.UHUB_USERNAME }} -p ${{ secrets.UHUB_PASSWORD }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          ENDSSH
