[workspace]
authors = ["chansyawn <chansyawn@gmail.com>"]
channels = ["conda-forge"]
name = "ORCA-DL"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]

[feature.model.dependencies]
python = "3.10.*"

[feature.model.pypi-dependencies]
accelerate = "==0.22.0"
einops = "==0.8.1"
fairscale = "==0.4.13"
global-land-mask = "==1.0.0"
gsw = "==3.6.19"
matplotlib = "==3.7.2"
numpy = "==1.24.3"
pandas = "==2.0.3"
scipy = "==1.15.2"
seaborn = "==0.13.2"
timm = "==0.6.11"
torch = "==1.12.1"
torchvision = "==0.13.1"
tqdm = "==4.65.2"
transformers = "==4.28.1"
xarray = "==2023.8.0"
netcdf4 = ">=1.7.4, <2"

[feature.model.tasks.inference]
cmd = "python predict/inference.py"

[feature.exec.dependencies]
cdo = ">=2.5.0,<3"

[feature.orchestrator.dependencies]
python = "3.10.*"
pandoc = ">=3.7.0,<4"
typst = ">=0.13.1,<0.14"

[feature.orchestrator.pypi-dependencies]
prefect = "==3.6.23"
python-dotenv = ">=1.0,<2"
boto3 = ">=1.40,<2"
requests = ">=2.32,<3"
tenacity = ">=9.0,<10"
matplotlib = "==3.7.2"
numpy = "==1.24.3"
openai = ">=1.40,<2"
pandas = "==2.0.3"
xarray = "==2023.8.0"
netcdf4 = ">=1.7.4, <2"

[feature.orchestrator.tasks.pipeline-serve]
cmd = "python orchestration/prefect_monthly_inference.py"

[feature.orchestrator.tasks.report]
cmd = "python -m orchestration.reporting.generate_pdf_report"

[feature.orchestrator.tasks.pipeline-trigger]
cmd = "prefect deployment run 海洋模型预测/海洋模型预测"

[environments]
model = ["model"]
exec = ["exec"]
orchestrator = ["orchestrator"]
